name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, typecheck, structure-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # ---------------------------------------------------------------------
      # API client generation + drift check.
      #
      # Per ADR-0020, the Encore-generated TypeScript SDK at
      # apps/web/src/lib/api-client/api-client.ts is committed to the repo
      # and PRs that change apps/api must include the regenerated client.
      #
      # CURRENTLY DEFERRED (Phase 2b Task 5):
      #   `encore gen client` requires (a) the Encore CLI installed on the
      #   runner and (b) a one-time `encore auth login` to fetch development
      #   secrets metadata from encore.cloud — even when the app stores no
      #   secrets there. The CLI install is trivial (`curl … | bash`); the
      #   auth login is not (it's interactive / requires a token secret).
      #
      #   The committed api-client.ts is a placeholder until the first
      #   developer with an Encore Cloud account regenerates it locally
      #   (see apps/web/src/lib/api-client/README.md). Once that lands,
      #   uncomment the two steps below and add an `ENCORE_AUTH_TOKEN`
      #   repository secret so CI can run `encore auth login --auth-key`
      #   before `gen:api-client`.
      # ---------------------------------------------------------------------
      # - name: Generate API client
      #   run: pnpm --filter @rhitta/web gen:api-client
      #
      # - name: Verify API client is up-to-date
      #   run: |
      #     if ! git diff --exit-code apps/web/src/lib/api-client/api-client.ts; then
      #       echo "::error::Generated API client differs from committed version. Run 'pnpm --filter @rhitta/web gen:api-client' and commit the changes."
      #       exit 1
      #     fi

      - name: Build packages
        run: pnpm -r --filter './packages/**' build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Validate
        run: pnpm validate
