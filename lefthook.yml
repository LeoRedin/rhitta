pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc}"
      run: pnpm exec biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files} && git add {staged_files}
    typecheck:
      run: pnpm typecheck
    structure-validate:
      run: pnpm structure:validate

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-push:
  commands:
    validate:
      run: pnpm lint && pnpm typecheck && pnpm validate
